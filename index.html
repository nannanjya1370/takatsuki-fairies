<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏸 高槻妖精会</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  :root {
    --pk-bg: #fff5f8;
    --pk-light: #ffe3ec;
    --pk-main: #ff8fab;
    --pk-strong: #f06595;
    --pk-deep: #c2255c;
    --pk-border: #ffc9d9;
  }
  body {
    background: var(--pk-bg);
    padding-bottom: 80px;
  }
  .app-header {
    background: linear-gradient(135deg, #ffd1dc, #ff9eb5);
    color: #fff;
    padding: 22px 0;
    margin-bottom: 20px;
    border-bottom: 4px solid var(--pk-main);
    box-shadow: 0 4px 14px rgba(240, 101, 149, .25);
  }
  .app-header h1 {
    font-weight: 800; letter-spacing: 3px; margin: 0;
    color: #fff; text-shadow: 0 2px 6px rgba(194, 37, 92, .35);
  }
  .app-header h1 .accent { color: var(--pk-deep); }
  .app-subtitle {
    font-family: Georgia, "Times New Roman", serif;
    font-style: italic; letter-spacing: 5px;
    font-size: .95rem; color: #fff; opacity: .9; margin-top: 4px;
  }
  .card {
    border: 1px solid var(--pk-border); border-radius: 14px; overflow: hidden;
    box-shadow: 0 4px 12px rgba(240, 101, 149, .12);
    margin-bottom: 18px;
    background: #fff;
  }
  .card-header {
    font-weight: bold;
    background: var(--pk-light);
    color: var(--pk-deep);
    border-bottom: 2px solid var(--pk-main);
    letter-spacing: 1px;
  }
  .member-row { display: flex; align-items: center; gap: 8px; padding: 6px 4px; border-bottom: 1px solid #ffeef4; flex-wrap: wrap; }
  .member-row:last-child { border-bottom: none; }
  .member-name { flex: 1; font-weight: 600; color: #59344a; min-width: 90px; }
  .rating-badge {
    font-variant-numeric: tabular-nums; min-width: 62px; text-align: center;
    background: var(--pk-main) !important; color: #fff;
  }
  .rank-badge { font-size: .72rem; border: 1px solid rgba(0,0,0,.08); }
  .rank-silver  { background: #e9ecef; color: #495057; }
  .rank-gold    { background: #ffe8a1; color: #9a6700; }
  .rank-diamond { background: linear-gradient(135deg, #d0ebff, #e7f5ff); color: #1971c2; }
  .rank-legend {
    font-size: .74rem; color: #b08698; text-align: right;
    margin-top: 8px; padding-top: 6px; border-top: 1px dashed var(--pk-border);
  }
  .court-card {
    border: 1px solid var(--pk-border);
    border-left: 6px solid var(--pk-main);
    background: #fff;
    box-shadow: 0 2px 8px rgba(240, 101, 149, .12);
  }
  .court-title { color: var(--pk-deep); font-weight: 800; letter-spacing: 1px; }
  .team-box {
    background: #fff0f5; border: 1px solid var(--pk-border);
    border-radius: 10px; padding: 8px 10px;
  }
  .vs-label { font-weight: 800; color: var(--pk-strong); font-size: 1.05rem; }
  .score-input { max-width: 70px; text-align: center; font-size: 1.1rem; }
  .rest-box { background: #fff8dc; border: 1px solid #ffe08a; border-radius: 10px; padding: 8px 12px; }
  .form-check-input:checked { background-color: var(--pk-strong); border-color: var(--pk-strong); }
  .btn-main {
    background: var(--pk-main); border: 2px solid var(--pk-strong);
    color: #fff; font-weight: 800; letter-spacing: 1px;
  }
  .btn-main:hover, .btn-main:focus {
    background: var(--pk-strong); border-color: var(--pk-deep); color: #fff;
  }
  .btn-outline-pk { color: var(--pk-deep); border: 2px solid var(--pk-main); font-weight: 600; background: #fff; }
  .btn-outline-pk:hover { background: var(--pk-light); color: var(--pk-deep); }
  .btn-check:checked + .btn-outline-pk {
    background: var(--pk-strong); color: #fff; border-color: var(--pk-strong);
  }
  .format-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
  .format-row .court-label { min-width: 84px; font-weight: 700; color: var(--pk-deep); }
  .fmt-badge { font-size: .75rem; vertical-align: middle; }
  .fmt-doubles { background: var(--pk-strong); color: #fff; }
  .fmt-singles { background: #ffd43b; color: #7a5200; }
  .delta-up { color: #198754; font-weight: bold; }
  .delta-down { color: #dc3545; font-weight: bold; }
  #json-io { font-size: .78rem; font-family: monospace; }
  .data-card { border-style: dashed; box-shadow: none; }
  .data-header {
    background: #fff; color: #b08698;
    border-bottom: none; font-size: .85rem; font-weight: 600;
    padding: 8px 16px; cursor: pointer; display: flex; align-items: center;
    letter-spacing: 1px;
  }
  .data-card .small { font-size: .74rem; }
  .ad-placeholder {
    border: 2px dashed var(--pk-border);
    border-radius: 10px;
    padding: 30px 10px;
    color: #b08698;
    background: #fffafc;
  }
  .ranking-row {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 2px; border-bottom: 1px solid #ffeef4; font-size: .9rem;
  }
  .ranking-row:last-child { border-bottom: none; }
  .ranking-pos { min-width: 40px; font-weight: 700; color: var(--pk-deep); font-size: .85rem; }
  .ranking-name {
    flex: 1; font-weight: 600; color: #59344a;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .points-badge {
    background: var(--pk-strong) !important; color: #fff;
    font-variant-numeric: tabular-nums;
  }
  .sched-row { padding: 7px 2px; border-bottom: 1px solid #ffeef4; font-size: .85rem; }
  .sched-row:last-child { border-bottom: none; }
  .sched-date { font-weight: 700; color: #59344a; cursor: pointer; }
  .sched-time { font-size: .72rem; color: #b08698; font-weight: 400; }
  .sched-arrow { float: right; color: #b08698; }
  .btn-vote { font-size: .74rem; padding: 1px 8px; font-weight: 600; }
  .vote-yes-on { background: var(--pk-strong) !important; color: #fff !important; border-color: var(--pk-strong) !important; }
  .vote-no-on { background: #868e96 !important; color: #fff !important; border-color: #868e96 !important; }
  .sched-counts { font-size: .76rem; color: #b08698; cursor: pointer; white-space: nowrap; }
  .sched-detail {
    background: #fff8fa; border: 1px solid #ffeef4; border-radius: 8px;
    padding: 4px 8px; font-size: .75rem; margin-top: 5px; color: #59344a;
  }
  @media (min-width: 992px) {
    .side-sticky { position: sticky; top: 12px; }
  }
  @media (max-width: 576px) {
    .container, .container-xl { padding-left: 10px; padding-right: 10px; }
    h1 { font-size: 1.35rem; }
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="container" style="max-width: 720px;">
    <h1>🏸 高槻<span class="accent">妖精会</span></h1>
    <div class="app-subtitle">Takatsuki Fairies</div>
  </div>
</div>

<div class="container-xl" style="max-width: 1200px;">
  <div class="row g-3">

  <!-- 左: 練習日程・出欠投票 ＋ スポンサー広告欄 -->
  <div class="col-lg-3 order-3 order-lg-1">
    <div class="side-sticky">
      <div class="card">
        <div class="card-header">📅 練習日程・出欠投票</div>
        <div class="card-body py-2">
          <div id="voter-area" class="mb-2"></div>
          <div id="schedule-list"></div>
          <div class="small text-muted mt-2" id="sched-note"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header">スポンサー</div>
        <div class="card-body">
          <div class="ad-placeholder text-center">
            <div style="font-size:1.8rem">📣</div>
            <div class="fw-bold mt-1">広告募集中</div>
            <div class="small mt-2">この枠にスポンサー様の<br>広告を掲載できます</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 中央: メイン -->
  <div class="col-lg-6 order-1 order-lg-2">

  <!-- メンバー管理 -->
  <div class="card">
    <div class="card-header">メンバー管理 <small class="opacity-75">（チェック＝今回の参加者）</small></div>
    <div class="card-body">
      <div class="input-group mb-3">
        <input type="text" id="new-name" class="form-control" placeholder="名前を入力" maxlength="20">
        <button class="btn btn-main" onclick="addMember()">追加</button>
      </div>
      <div class="d-flex gap-2 mb-2">
        <button class="btn btn-sm btn-outline-pk" onclick="checkAll(false)">全解除</button>
        <span class="ms-auto align-self-center small text-muted">参加: <b id="attend-count">0</b>人</span>
      </div>
      <div id="member-list"></div>
      <div class="rank-legend">ランク：🥈 シルバー（5回〜）／ 🥇 ゴールド（15回〜）／ 💎 ダイヤモンド（30回〜）</div>
    </div>
  </div>

  <!-- 設定 -->
  <div class="card">
    <div class="card-header">コート・試合形式</div>
    <div class="card-body">
      <label class="form-label fw-bold small">使用コート数</label>
      <div class="btn-group w-100 mb-3" role="group">
        <input type="radio" class="btn-check" name="courts" id="c1" value="1" onchange="renderFormatRows()">
        <label class="btn btn-outline-pk" for="c1">1面</label>
        <input type="radio" class="btn-check" name="courts" id="c2" value="2" checked onchange="renderFormatRows()">
        <label class="btn btn-outline-pk" for="c2">2面</label>
        <input type="radio" class="btn-check" name="courts" id="c3" value="3" onchange="renderFormatRows()">
        <label class="btn btn-outline-pk" for="c3">3面</label>
      </div>

      <label class="form-label fw-bold small">コートごとの試合形式</label>
      <div id="format-rows" class="mb-2"></div>
      <div class="small text-muted mb-2">必要人数: <b id="needed-count">8</b>人</div>

      <button class="btn btn-main btn-lg w-100 mt-1" onclick="generateMatches()">Bibbidi-Bobbidi-Boo !!</button>
      <div id="gen-warning" class="mt-2"></div>
    </div>
  </div>

  <!-- 対戦表 -->
  <div class="card" id="matches-card" style="display:none">
    <div class="card-header">今回の対戦 <span id="mix-badge"></span></div>
    <div class="card-body" id="matches-area"></div>
  </div>

  <!-- データ管理（折りたたみ式・コンパクト） -->
  <div class="card data-card">
    <div class="card-header data-header" onclick="toggleData()">
      <span>データ管理・引っ越し</span>
      <span class="ms-auto" id="data-arrow">▸</span>
    </div>
    <div class="card-body py-2" id="data-body" style="display:none">
      <div class="small text-muted mb-1">スマホ間の移行はJSONテキストのコピー＆ペーストが簡単です。</div>
      <div class="d-flex flex-wrap gap-1 mb-1">
        <button class="btn btn-outline-pk btn-sm py-0" onclick="showJSON()">データを表示</button>
        <button class="btn btn-outline-pk btn-sm py-0" onclick="copyJSON()">コピー</button>
        <button class="btn btn-main btn-sm py-0" onclick="loadJSONText()">貼り付けたデータを読み込み</button>
      </div>
      <textarea id="json-io" class="form-control mb-2" rows="3"
        placeholder="「データを表示」→コピーして他のスマホへ。受け取る側はここに貼り付けて「読み込み」。"></textarea>
      <div class="d-flex flex-wrap gap-1 align-items-center">
        <button class="btn btn-outline-pk btn-sm py-0" onclick="exportJSON()">ファイル保存</button>
        <label class="btn btn-outline-pk btn-sm py-0 mb-0">
          ファイル読み込み<input type="file" accept=".json" hidden onchange="importJSON(this)">
        </label>
        <button class="btn btn-outline-danger btn-sm py-0 ms-auto" onclick="resetAll()">全データ初期化</button>
      </div>
      <div class="small text-muted mt-1">※データは各スマホのブラウザに自動保存。端末間の自動同期はありません。</div>
    </div>
  </div>

  </div><!-- /中央メイン -->

  <!-- 右: ポイントランキング -->
  <div class="col-lg-3 order-2 order-lg-3">
    <div class="side-sticky">
      <div class="card">
        <div class="card-header">🏆 ポイントランキング</div>
        <div class="card-body py-2" id="ranking-list"></div>
        <div class="px-3 pb-2 small text-muted" id="ranking-legend"></div>
      </div>
    </div>
  </div>

  </div><!-- /row -->
</div>

<script>
"use strict";

// ================= データ =================
const STORAGE_KEY = "badminton-pairing-v1";
const INITIAL_RATING = 1000;
// 勝敗ポイント: 勝ち/負けの試合結果で加算。参加ポイントは勝ちポイントの2倍（1日1回のみ）
const WIN_POINTS = 2;
const LOSE_POINTS = 1;
const ATTEND_POINTS = WIN_POINTS * 2;
const RANKS = [
  { min: 30, name: "ダイヤモンド", cls: "rank-diamond", icon: "💎" },
  { min: 15, name: "ゴールド",     cls: "rank-gold", icon: "🥇" },
  { min: 5,  name: "シルバー",     cls: "rank-silver", icon: "🥈" },
];

// 練習日程（時間は全日程共通）
const SCHEDULE = [
  "2026-07-05", "2026-08-02", "2026-09-06", "2026-10-04",
  "2026-11-01", "2026-12-06", "2027-02-07", "2027-03-07",
];
const SCHEDULE_TIME = "18:00〜21:00";
// GAS WebアプリのURLを設定すると、投票が全端末で共有・自動集計されるオンラインモードになる。
// 空文字のままなら従来どおりこの端末内（LocalStorage）だけで動く。
const SYNC_URL = "";
const VOTER_NAME_KEY = "badminton-voter-name-v1";

let state = {
  members: [],        // {id, name, rating, games, wins, attend, attendCount, lastAttend, points}
  togetherCounts: {}, // "idA|idB"(小さい順) -> ペアを組んだ回数
  vsCounts: {},       // "idA|idB" -> 対戦した回数
  attendVotes: {},    // "YYYY-MM-DD" -> { memberId: "yes"|"no" }
  voterId: null,      // この端末で投票する人
  nextId: 1,
};
let openSched = new Set(); // 回答一覧を開いている日程のindex
let serverVotes = null;    // オンラインモード時のサーバー上の全投票 { "YYYY-MM-DD": { 名前: "yes"|"no" } }
let syncStatus = "";       // "" | "loading" | "ok" | "error"
let session = { playCount: {} }; // ページを開いてからの出場回数（休憩の公平化用）
let courtFormats = ["doubles", "doubles", "doubles"]; // コートごとの形式（UI選択を保持）
let currentMatches = null; // {mix, courts:[{format,teamA,teamB,saved}], resting:[ids]}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = Object.assign(state, JSON.parse(raw));
    // 旧バージョンのデータに参加回数フィールドを補完
    state.members.forEach(m => {
      if (m.attendCount === undefined) m.attendCount = 0;
      if (m.lastAttend === undefined) m.lastAttend = "";
      if (m.points === undefined) m.points = 0;
    });
  } catch (e) { console.warn("load failed", e); }
}
function member(id) { return state.members.find(m => m.id === id); }
function pairKey(a, b) { return a < b ? `${a}|${b}` : `${b}|${a}`; }
function togetherCount(a, b) { return state.togetherCounts[pairKey(a, b)] || 0; }
function vsCount(a, b) { return state.vsCounts[pairKey(a, b)] || 0; }
function courtSize(fmt) { return fmt === "doubles" ? 4 : 2; }
function rankOf(m) { return RANKS.find(r => (m.attendCount || 0) >= r.min) || null; }
function today() { return new Date().toISOString().slice(0, 10); }

// ================= メンバー管理 =================
function addMember() {
  const input = document.getElementById("new-name");
  const name = input.value.trim();
  if (!name) return;
  if (state.members.some(m => m.name === name)) { alert("同じ名前のメンバーがいます"); return; }
  state.members.push({
    id: state.nextId++, name, rating: INITIAL_RATING,
    games: 0, wins: 0, attend: true, attendCount: 0, lastAttend: "", points: 0,
  });
  input.value = "";
  save(); renderMembers();
}

function renameMember(id) {
  const m = member(id);
  const input = prompt(`「${m.name}」の新しい名前を入力してください`, m.name);
  if (input === null) return;
  const name = input.trim().slice(0, 20);
  if (!name || name === m.name) return;
  if (state.members.some(x => x.name === name && x.id !== id)) { alert("同じ名前のメンバーがいます"); return; }
  m.name = name;
  save(); renderMembers();
  if (currentMatches) renderMatches(); // 対戦表の表示名も更新
}

function removeMember(id) {
  const m = member(id);
  if (!confirm(`「${m.name}」を削除しますか？（レーティング等も消えます）`)) return;
  state.members = state.members.filter(x => x.id !== id);
  save(); renderMembers();
}

function toggleAttend(id) {
  const m = member(id);
  m.attend = !m.attend;
  save(); renderMembers();
}

function checkAll(v) {
  state.members.forEach(m => m.attend = v);
  save(); renderMembers();
}

function renderMembers() {
  const wrap = document.getElementById("member-list");
  if (state.members.length === 0) {
    wrap.innerHTML = `<p class="text-muted small mb-0">メンバーを追加してください</p>`;
  } else {
    wrap.innerHTML = state.members.map(m => {
      const rank = rankOf(m);
      const rankHtml = rank
        ? ` <span class="badge rank-badge ${rank.cls}">${rank.icon} ${rank.name}</span>` : "";
      return `
      <div class="member-row">
        <input class="form-check-input mt-0" type="checkbox" ${m.attend ? "checked" : ""}
               onchange="toggleAttend(${m.id})" style="transform:scale(1.3)">
        <span class="member-name">${esc(m.name)}</span>
        <span class="badge rating-badge">R ${m.rating}</span>
        <span class="small text-muted">参加${m.attendCount || 0}回${rankHtml}・${m.games}戦${m.wins}勝</span>
        <button class="btn btn-sm btn-outline-pk py-0" onclick="renameMember(${m.id})">✎</button>
        <button class="btn btn-sm btn-outline-danger py-0" onclick="removeMember(${m.id})">×</button>
      </div>`;
    }).join("");
  }
  document.getElementById("attend-count").textContent = state.members.filter(m => m.attend).length;
  renderRanking();
  renderSchedule();
}

// ================= 練習日程・出欠投票 =================
function schedLabel(iso) {
  const d = new Date(iso + "T00:00:00");
  const wd = "日月火水木金土"[d.getDay()];
  return `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, "0")}/${String(d.getDate()).padStart(2, "0")}(${wd})`;
}

function setVoter(v) {
  state.voterId = v ? +v : null;
  save(); renderSchedule();
}

function myVoterName() { return (localStorage.getItem(VOTER_NAME_KEY) || "").trim(); }
function setVoterName(v) {
  localStorage.setItem(VOTER_NAME_KEY, v.trim().slice(0, 20));
  renderSchedule();
}

async function fetchVotes() {
  if (!SYNC_URL) return;
  syncStatus = "loading"; renderSchedule();
  try {
    const res = await fetch(SYNC_URL);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "server error");
    serverVotes = data.votes || {};
    syncStatus = "ok";
  } catch (e) {
    console.warn("fetchVotes failed", e);
    syncStatus = "error";
  }
  renderSchedule();
}

async function voteAttend(iso, choice) {
  // オンラインモード: サーバーに送信して全端末で共有
  if (SYNC_URL) {
    const name = myVoterName();
    if (!name) { alert("先に「あなたの名前」を入力してください"); return; }
    const cur = serverVotes && serverVotes[iso] ? serverVotes[iso][name] : undefined;
    const send = cur === choice ? "clear" : choice; // 同じボタン再タップで取り消し
    syncStatus = "loading"; renderSchedule();
    try {
      const res = await fetch(SYNC_URL, {
        method: "POST",
        body: JSON.stringify({ date: iso, name, choice: send }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "server error");
      serverVotes = data.votes || {};
      syncStatus = "ok";
    } catch (e) {
      console.warn("vote failed", e);
      syncStatus = "error";
      alert("投票の送信に失敗しました。通信環境を確認してもう一度お試しください。");
    }
    renderSchedule();
    return;
  }
  // ローカルモード: この端末内だけで記録
  if (!state.voterId || !member(state.voterId)) {
    alert("先に「投票する人」を選んでください"); return;
  }
  if (!state.attendVotes[iso]) state.attendVotes[iso] = {};
  // 同じボタンをもう一度押すと投票取り消し
  if (state.attendVotes[iso][state.voterId] === choice) delete state.attendVotes[iso][state.voterId];
  else state.attendVotes[iso][state.voterId] = choice;
  save(); renderSchedule();
}

function toggleSchedDetail(i) {
  openSched.has(i) ? openSched.delete(i) : openSched.add(i);
  renderSchedule();
}

function renderVoterArea() {
  const area = document.getElementById("voter-area");
  if (SYNC_URL) {
    // オンラインモード: 名前を直接入力（メンバー名＋投票済みの名前を候補に出す）
    const known = new Set(state.members.map(m => m.name));
    if (serverVotes) for (const d of Object.values(serverVotes)) for (const n of Object.keys(d)) known.add(n);
    const status = syncStatus === "loading" ? "⏳ 同期中…"
      : syncStatus === "error" ? "⚠️ 通信エラー。ページを再読み込みしてください"
      : syncStatus === "ok" ? "✅ オンライン集計中（全員のスマホと共有）" : "";
    area.innerHTML = `
      <input id="voter-name" class="form-control form-control-sm" list="voter-name-list"
             placeholder="あなたの名前" maxlength="20" value="${esc(myVoterName())}"
             onchange="setVoterName(this.value)">
      <datalist id="voter-name-list">${[...known].map(n => `<option value="${esc(n)}">`).join("")}</datalist>
      <div class="small text-muted mt-1">${status}</div>`;
  } else {
    const voter = state.voterId && member(state.voterId) ? state.voterId : null;
    area.innerHTML = `
      <select id="voter-select" class="form-select form-select-sm" onchange="setVoter(this.value)">
        <option value="">投票する人を選択…</option>
        ${state.members.map(m =>
          `<option value="${m.id}" ${m.id === voter ? "selected" : ""}>${esc(m.name)}</option>`).join("")}
      </select>`;
  }
}

function renderSchedule() {
  renderVoterArea();
  document.getElementById("sched-note").textContent = SYNC_URL
    ? "※日付をタップすると全員の回答が見られます。投票は全員のスマホと自動で共有されます。"
    : "※日付をタップすると全員の回答が見られます。投票はこの端末に保存されます。";

  document.getElementById("schedule-list").innerHTML = SCHEDULE.map((iso, i) => {
    let yesNames, noNames, mine;
    if (SYNC_URL) {
      const v = (serverVotes || {})[iso] || {};
      yesNames = Object.keys(v).filter(n => v[n] === "yes").sort();
      noNames = Object.keys(v).filter(n => v[n] === "no").sort();
      mine = myVoterName() ? v[myVoterName()] : undefined;
    } else {
      const votes = state.attendVotes[iso] || {};
      const voter = state.voterId && member(state.voterId) ? state.voterId : null;
      yesNames = state.members.filter(m => votes[m.id] === "yes").map(m => m.name);
      noNames = state.members.filter(m => votes[m.id] === "no").map(m => m.name);
      mine = voter ? votes[voter] : undefined;
    }
    const detail = openSched.has(i) ? `
      <div class="sched-detail">
        <div>○ 参加（${yesNames.length}人）: ${yesNames.map(esc).join("、") || "－"}</div>
        <div>× 不参加（${noNames.length}人）: ${noNames.map(esc).join("、") || "－"}</div>
      </div>` : "";
    return `
    <div class="sched-row">
      <div class="sched-date" onclick="toggleSchedDetail(${i})">${schedLabel(iso)}
        <span class="sched-time">${SCHEDULE_TIME}</span>
        <span class="sched-arrow">${openSched.has(i) ? "▾" : "▸"}</span>
      </div>
      <div class="d-flex align-items-center gap-1 mt-1">
        <button class="btn btn-sm btn-vote ${mine === "yes" ? "vote-yes-on" : "btn-outline-pk"}"
                onclick="voteAttend('${iso}','yes')">○ 参加</button>
        <button class="btn btn-sm btn-vote ${mine === "no" ? "vote-no-on" : "btn-outline-secondary"}"
                onclick="voteAttend('${iso}','no')">× 不参加</button>
        <span class="sched-counts ms-auto" onclick="toggleSchedDetail(${i})">○${yesNames.length} ×${noNames.length}</span>
      </div>
      ${detail}
    </div>`;
  }).join("");
}

// ================= ポイントランキング =================
function renderRanking() {
  const wrap = document.getElementById("ranking-list");
  document.getElementById("ranking-legend").textContent =
    `勝ち +${WIN_POINTS}pt ／ 負け +${LOSE_POINTS}pt ／ 参加 +${ATTEND_POINTS}pt（1日1回）`;
  if (state.members.length === 0) {
    wrap.innerHTML = `<p class="text-muted small mb-0">メンバーを追加するとランキングが表示されます</p>`;
    return;
  }
  const medals = ["🥇", "🥈", "🥉"];
  const sorted = [...state.members].sort((a, b) =>
    (b.points || 0) - (a.points || 0) || b.rating - a.rating);
  wrap.innerHTML = sorted.map((m, i) => `
    <div class="ranking-row">
      <span class="ranking-pos">${medals[i] || `${i + 1}位`}</span>
      <span class="ranking-name">${esc(m.name)}</span>
      <span class="badge points-badge">${m.points || 0} pt</span>
    </div>`).join("");
}

function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }

// ================= コートごとの形式UI =================
function courtCount() { return +document.querySelector('input[name="courts"]:checked').value; }

function renderFormatRows() {
  const n = courtCount();
  const wrap = document.getElementById("format-rows");
  wrap.innerHTML = Array.from({ length: n }, (_, i) => `
    <div class="format-row">
      <span class="court-label">コート${i + 1}：</span>
      <div class="btn-group flex-grow-1" role="group">
        <input type="radio" class="btn-check" name="fmt-${i}" id="fmt-${i}-d" value="doubles"
               ${courtFormats[i] === "doubles" ? "checked" : ""} onchange="setFormat(${i},'doubles')">
        <label class="btn btn-outline-pk btn-sm" for="fmt-${i}-d">ダブルス（4人）</label>
        <input type="radio" class="btn-check" name="fmt-${i}" id="fmt-${i}-s" value="singles"
               ${courtFormats[i] === "singles" ? "checked" : ""} onchange="setFormat(${i},'singles')">
        <label class="btn btn-outline-pk btn-sm" for="fmt-${i}-s">シングルス（2人）</label>
      </div>
    </div>`).join("");
  updateNeededCount();
}

function setFormat(i, fmt) {
  courtFormats[i] = fmt;
  updateNeededCount();
}

function updateNeededCount() {
  const n = courtCount();
  const total = courtFormats.slice(0, n).reduce((s, f) => s + courtSize(f), 0);
  document.getElementById("needed-count").textContent = total;
}

// ================= 組み合わせ生成 =================
function generateMatches() {
  const warnEl = document.getElementById("gen-warning");
  warnEl.innerHTML = "";
  const attendees = state.members.filter(m => m.attend).map(m => m.id);
  const wantedFormats = courtFormats.slice(0, courtCount());
  const wantedTotal = wantedFormats.reduce((s, f) => s + courtSize(f), 0);

  // 人数が足りない場合: 後ろのコートから外して組める分だけ生成
  const activeFormats = [...wantedFormats];
  while (activeFormats.length &&
         activeFormats.reduce((s, f) => s + courtSize(f), 0) > attendees.length) {
    activeFormats.pop();
  }
  if (activeFormats.length === 0) {
    warnEl.innerHTML = `<div class="alert alert-danger py-2 mb-0">参加者が${attendees.length}人では1コートも組めません（コート1の${wantedFormats[0] === "doubles" ? "ダブルスには4人" : "シングルスには2人"}必要）。</div>`;
    return;
  }
  const total = activeFormats.reduce((s, f) => s + courtSize(f), 0);
  if (activeFormats.length < wantedFormats.length) {
    warnEl.innerHTML = `<div class="alert alert-warning py-2 mb-0">⚠️ 参加${attendees.length}人では${wantedFormats.length}面（必要${wantedTotal}人）に足りないため、<b>コート${activeFormats.length}までの${activeFormats.length}面</b>で生成しました。</div>`;
  }

  // 参加回数カウント＋参加ポイント付与（同じ日は1回のみ）→ 会員ランク・ランキングに反映
  const t = today();
  for (const id of attendees) {
    const m = member(id);
    if (m.lastAttend !== t) {
      m.lastAttend = t;
      m.attendCount = (m.attendCount || 0) + 1;
      m.points = (m.points || 0) + ATTEND_POINTS;
    }
  }

  // 出場回数が少ない人を優先して出場させる（休憩の公平化）
  const sorted = [...attendees].sort((a, b) =>
    (session.playCount[a] || 0) - (session.playCount[b] || 0) || Math.random() - 0.5);
  const playing = sorted.slice(0, total);
  const resting = sorted.slice(total);

  // ★特殊ルール: 約30%でMIX戦（ハンデ戦）
  const mix = Math.random() < 0.3;

  // ランダム候補を大量生成してスコアリング（低ペナルティを採用）
  let best = null, bestPenalty = Infinity;
  for (let iter = 0; iter < 500; iter++) {
    const shuffled = [...playing].sort(() => Math.random() - 0.5);
    const cand = [];
    let pos = 0;
    for (const fmt of activeFormats) {
      const g = shuffled.slice(pos, pos + courtSize(fmt));
      pos += courtSize(fmt);
      cand.push(fmt === "doubles"
        ? { format: fmt, teamA: [g[0], g[1]], teamB: [g[2], g[3]] }
        : { format: fmt, teamA: [g[0]], teamB: [g[1]] });
    }
    const p = penalty(cand, mix);
    if (p < bestPenalty) { bestPenalty = p; best = cand; }
  }

  currentMatches = {
    mix,
    courts: best.map(c => ({ ...c, saved: false })),
    resting,
  };
  save(); renderMembers(); renderMatches();
}

function penalty(cand, mix) {
  let p = 0;
  for (const court of cand) {
    const { format, teamA, teamB } = court;
    const rA = teamA.reduce((s, id) => s + member(id).rating, 0);
    const rB = teamB.reduce((s, id) => s + member(id).rating, 0);

    // 1) 過去のペア被り（最重要・重いペナルティ）
    if (format === "doubles") {
      p += 250 * (Math.pow(togetherCount(teamA[0], teamA[1]), 1.5)
                + Math.pow(togetherCount(teamB[0], teamB[1]), 1.5));
    }
    // 対戦相手の被りは軽めに回避
    for (const a of teamA) for (const b of teamB) p += 40 * vsCount(a, b);

    // 2) チーム間のパワーバランス（合計レーティング差）
    p += Math.abs(rA - rB);

    // 3) MIX戦: ダブルスはペア内レート差が大きいほど、シングルスは実力差マッチほど選ばれやすく
    if (mix && format === "doubles") {
      const gapA = Math.abs(member(teamA[0]).rating - member(teamA[1]).rating);
      const gapB = Math.abs(member(teamB[0]).rating - member(teamB[1]).rating);
      p -= 0.8 * (gapA + gapB);
    }
    if (mix && format === "singles") {
      p -= 1.4 * Math.abs(rA - rB);
    }
  }
  return p;
}

function renderMatches() {
  const card = document.getElementById("matches-card");
  const area = document.getElementById("matches-area");
  const badge = document.getElementById("mix-badge");
  card.style.display = "block";
  badge.innerHTML = currentMatches.mix
    ? `<span class="badge" style="background:#f06595">🎲 MIX戦（ハンデ戦回）</span>`
    : `<span class="badge" style="background:#f06595">⚖️ バランス戦</span>`;

  const teamHtml = (ids) => ids.map(id => {
    const m = member(id);
    return `<div>${esc(m.name)} <small class="text-muted">(R${m.rating})</small></div>`;
  }).join("");

  area.innerHTML = currentMatches.courts.map((c, i) => {
    const rA = c.teamA.reduce((s, id) => s + member(id).rating, 0);
    const rB = c.teamB.reduce((s, id) => s + member(id).rating, 0);
    const fmtBadge = c.format === "doubles"
      ? `<span class="badge fmt-badge fmt-doubles">ダブルス</span>`
      : `<span class="badge fmt-badge fmt-singles">シングルス</span>`;
    return `
    <div class="card court-card mb-3">
      <div class="card-body py-2">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <span class="court-title">コート ${i + 1} ${fmtBadge}</span>
          <small class="text-muted">合計R: ${rA} vs ${rB}（差${Math.abs(rA - rB)}）</small>
        </div>
        <div class="row g-2 align-items-center">
          <div class="col-5"><div class="team-box">${teamHtml(c.teamA)}</div></div>
          <div class="col-2 text-center vs-label">VS</div>
          <div class="col-5"><div class="team-box">${teamHtml(c.teamB)}</div></div>
        </div>
        <div class="d-flex gap-2 align-items-center justify-content-center mt-2">
          <input type="number" class="form-control score-input" id="score-a-${i}" placeholder="21" min="0" max="99" ${c.saved ? "disabled" : ""}>
          <span>−</span>
          <input type="number" class="form-control score-input" id="score-b-${i}" placeholder="15" min="0" max="99" ${c.saved ? "disabled" : ""}>
          <button class="btn btn-sm btn-main" onclick="saveResult(${i})" ${c.saved ? "disabled" : ""}>
            ${c.saved ? "保存済み" : "結果保存"}</button>
        </div>
        <div class="text-center small mt-1" id="result-msg-${i}"></div>
      </div>
    </div>`;
  }).join("") + (currentMatches.resting.length ? `
    <div class="rest-box">☕ <b>休憩:</b> ${currentMatches.resting.map(id => esc(member(id).name)).join("、")}
    <br><small class="text-muted">※次回生成時に優先して出場します</small></div>` : "");
}

// ================= レーティング更新（簡易イロ） =================
function saveResult(i) {
  const c = currentMatches.courts[i];
  if (c.saved) return;
  const sa = +document.getElementById(`score-a-${i}`).value;
  const sb = +document.getElementById(`score-b-${i}`).value;
  if (isNaN(sa) || isNaN(sb) || (sa === 0 && sb === 0) || sa === sb) {
    alert("点数を正しく入力してください（同点は保存できません）"); return;
  }

  const rA = c.teamA.reduce((s, id) => s + member(id).rating, 0) / c.teamA.length;
  const rB = c.teamB.reduce((s, id) => s + member(id).rating, 0) / c.teamB.length;
  const expectedA = 1 / (1 + Math.pow(10, (rB - rA) / 400));
  const scoreA = sa > sb ? 1 : 0;
  // 得失点差で変動幅を増減（21点ゲーム基準）
  const margin = 1 + Math.abs(sa - sb) / Math.max(21, Math.max(sa, sb));
  const K = 32;
  const delta = Math.round(K * margin * (scoreA - expectedA));

  const winners = sa > sb ? c.teamA : c.teamB;
  const losers = sa > sb ? c.teamB : c.teamA;
  for (const id of c.teamA) { const m = member(id); m.rating = Math.max(100, m.rating + delta); m.games++; }
  for (const id of c.teamB) { const m = member(id); m.rating = Math.max(100, m.rating - delta); m.games++; }
  for (const id of winners) { const m = member(id); m.wins++; m.points = (m.points || 0) + WIN_POINTS; }
  for (const id of losers) { const m = member(id); m.points = (m.points || 0) + LOSE_POINTS; }

  // ペア・対戦履歴を記録
  if (c.format === "doubles") {
    bump(state.togetherCounts, pairKey(c.teamA[0], c.teamA[1]));
    bump(state.togetherCounts, pairKey(c.teamB[0], c.teamB[1]));
  }
  for (const a of c.teamA) for (const b of c.teamB) bump(state.vsCounts, pairKey(a, b));
  for (const id of [...c.teamA, ...c.teamB]) session.playCount[id] = (session.playCount[id] || 0) + 1;

  c.saved = true;
  save(); renderMembers(); renderMatches();
  const sign = delta >= 0 ? "+" : "";
  document.getElementById(`result-msg-${i}`).innerHTML =
    `保存しました。レーティング変動: チームA <span class="${delta >= 0 ? "delta-up" : "delta-down"}">${sign}${delta}</span> ／ チームB <span class="${-delta >= 0 ? "delta-up" : "delta-down"}">${delta > 0 ? "-" : "+"}${Math.abs(delta)}</span>`;
}

function bump(obj, key) { obj[key] = (obj[key] || 0) + 1; }

// ================= データ管理エリアの開閉 =================
function toggleData() {
  const body = document.getElementById("data-body");
  const open = body.style.display === "none";
  body.style.display = open ? "block" : "none";
  document.getElementById("data-arrow").textContent = open ? "▾" : "▸";
}

// ================= JSONテキストでの移行（コピー＆ペースト） =================
function showJSON() {
  document.getElementById("json-io").value = JSON.stringify(state);
}

function copyJSON() {
  const ta = document.getElementById("json-io");
  if (!ta.value) showJSON();
  ta.select();
  navigator.clipboard.writeText(ta.value)
    .then(() => alert("コピーしました。LINEなどで他のメンバーに送れます。"))
    .catch(() => alert("コピーに失敗しました。テキストを長押しで全選択してコピーしてください。"));
}

function loadJSONText() {
  const text = document.getElementById("json-io").value.trim();
  if (!text) { alert("テキスト欄にデータを貼り付けてから押してください"); return; }
  applyImportedData(text);
}

// ================= ファイルでのエクスポート / インポート =================
function exportJSON() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `badminton-data-${today()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function importJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => { applyImportedData(reader.result); input.value = ""; };
  reader.readAsText(file);
}

function applyImportedData(text) {
  try {
    const data = JSON.parse(text);
    if (!Array.isArray(data.members)) throw new Error("メンバーデータが見つかりません");
    if (!confirm(`メンバー${data.members.length}人のデータを読み込みます。この端末の現在のデータは上書きされます。よろしいですか？`)) return;
    state = Object.assign({ togetherCounts: {}, vsCounts: {}, attendVotes: {}, voterId: null, nextId: 1 }, data);
    state.members.forEach(m => {
      if (m.attendCount === undefined) m.attendCount = 0;
      if (m.lastAttend === undefined) m.lastAttend = "";
      if (m.points === undefined) m.points = 0;
    });
    save(); renderMembers();
    alert("読み込みました！");
  } catch (e) { alert("読み込みに失敗しました: " + e.message); }
}

function resetAll() {
  if (!confirm("メンバー・レーティング・履歴をすべて削除します。よろしいですか？")) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

// ================= 初期化 =================
document.getElementById("new-name").addEventListener("keydown", e => {
  if (e.key === "Enter") addMember();
});
load();
renderMembers();
renderFormatRows();
fetchVotes();
</script>
